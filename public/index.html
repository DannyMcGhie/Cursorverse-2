<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cursorverse</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* Hide OS cursor globally */
    html, body, * {
      cursor: none !important;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #202020;
      color: white;
    }

    #playerCount {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 20px;
      font-weight: 600;
      z-index: 3000;
    }

    .cursor {
      width: 17px;
      height: 28px;
      position: absolute;
      pointer-events: none;
      background-size: contain;
      background-repeat: no-repeat;
      z-index: 9999; /* always above overlays */
    }

    .usernameLabel {
      position: absolute;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      transform: translate(-50%, -25px);
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 1px 1px 2px black; /* makes it readable on dark bg */
    }

    /* Username overlay */
    #usernameOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    #usernameBox {
      background: #333;
      padding: 25px 35px;
      border-radius: 12px;
      text-align: center;
    }

    #usernameBox h2 {
      margin-bottom: 15px;
      font-weight: 600;
    }

    #usernameBox input {
      padding: 10px;
      width: 220px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      background: #222;
      color: white;
      font-size: 14px;
    }

    #usernameBox button {
      padding: 10px 18px;
      border: none;
      background: limegreen;
      color: white;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    #usernameBox button:hover {
      background: green;
    }

    /* Username color selector */
    #colorSelector {
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .colorBox {
      width: 25px;
      height: 25px;
      border-radius: 5px;
      cursor: pointer;
      border: 2px solid white;
      transition: transform 0.2s;
    }

    .colorBox:hover {
      transform: scale(1.2);
    }

    .colorBox.selected {
      border: 3px solid white;
      transform: scale(1.2);
    }

    /* Chat box */
    #chatBox {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 320px;
      max-height: 220px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
      font-weight: 400;
      z-index: 2500;
    }

    #chatMessages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 14px;
      line-height: 1.4em;
    }

    #chatMessages span {
      font-weight: 600; /* bold usernames */
    }

    #chatInput {
      border: none;
      padding: 10px;
      width: 100%;
      box-sizing: border-box;
      border-top: 1px solid #444;
      background: #222;
      color: white;
      border-radius: 0 0 12px 12px;
      font-size: 14px;
    }

/* Skins button */
#skinsButton {
  position: absolute;
  bottom: 10px; /* distance from bottom */
  right: 10px;  /* move to bottom-right corner */
  padding: 16px 28px; /* increase size */
  background: #333;
  border: none;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  font-size: 18px; /* bigger text */
  cursor: pointer;
  z-index: 2500;
  transition: transform 0.2s;
}

#skinsButton:hover {
  background: #444;
  transform: scale(1.05); /* subtle hover zoom */
}


    /* Skins overlay */
    #skinsOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 4000; /* raised above player count */
    }

    #skinsBox {
      background: #333;
      padding: 20px;
      border-radius: 12px;
      width: 500px;
      max-height: 70%;
      display: flex;
      flex-direction: column;
    }

    #skinsBox h2 {
      text-align: center;
      margin-bottom: 15px;
      font-weight: 600;
    }

    #skinsGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .skinOption {
      background: #222;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, border 0.2s;
      border: 2px solid transparent;
    }

    .skinOption img {
      width: 32px;
      height: auto;
      margin-bottom: 5px;
    }

    .skinOption:hover {
      transform: scale(1.05);
    }

    .skinOption.selected {
      border: 2px solid limegreen;
    }

    #closeSkins {
      margin-top: 10px;
      align-self: center;
      padding: 8px 16px;
      border: none;
      background: crimson;
      color: white;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
    }

    #closeSkins:hover {
      background: darkred;
    }
  </style>
</head>
<body>
  <div id="playerCount">Players online: 0</div>

  <!-- Username overlay -->
  <div id="usernameOverlay">
    <div id="usernameBox">
      <h2>Enter your username</h2>

      <!-- Color selector -->
      <div id="colorSelector">
        <div class="colorBox" data-color="#ff0000" style="background:#ff0000;"></div>
        <div class="colorBox" data-color="#ff6600" style="background:#ff6600;"></div>
        <div class="colorBox selected" data-color="#ffeb3b" style="background:#ffeb3b;"></div>
        <div class="colorBox" data-color="#4caf50" style="background:#4caf50;"></div>
        <div class="colorBox" data-color="#002fff" style="background:#002fff;"></div>
        <div class="colorBox" data-color="#aa2ec0" style="background:#aa2ec0;"></div>
        <div class="colorBox" data-color="#ff00aa" style="background:#ff00aa;"></div>
      </div>

      <input type="text" id="usernameInput" placeholder="Username" maxlength="15" />
      <button id="joinBtn">Join</button>
    </div>
  </div>

  <!-- Chat box -->
  <div id="chatBox">
    <div id="chatMessages"></div>
    <input id="chatInput" type="text" placeholder="Type / to chat" maxlength="200" />
  </div>

  <!-- Skins button -->
  <button id="skinsButton">Skins</button>

  <!-- Skins overlay -->
  <div id="skinsOverlay">
    <div id="skinsBox">
      <h2>Select a Skin</h2>
      <div id="skinsGrid">
        <!-- JS will populate this with skin options -->
      </div>
      <button id="closeSkins">Close</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
